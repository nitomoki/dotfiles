set -g prefix C-q
unbind C-b

set -g mouse on
set -g history-limit 1000
set -g set-titles on
set -g set-titles-string '#S:#I:#W - #{pane_title}'

# OSC 52 clipboard (DCS passthrough for mosh + tmux 3.4)
set -g set-clipboard external
set -g allow-passthrough on
set -g terminal-overrides "xterm-256color:Ms=\\E]52;c;%p2%s\\E\\\\"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \
  "bash -c 'D=$(base64|tr -d \\\\n);printf \\\\ePtmux\\;\\\\e\\\\e]52\\;c\\;%s\\\\a\\\\e\\\\\\\\ \"\$D\" > #{pane_tty}'"

set -g status on
set -g status-position bottom
set -g status-style 'bg=default,fg=colour250'
set -g status-left-length 20
set -g status-left '#(if [ -f ~/.machine-name ]; then cat ~/.machine-name; else hostname -s; fi) '
set -g status-right ''

# Per-window Claude Code agent status (running/waiting/idle)
# Hooks in ~/.claude/settings.json write state to /tmp/claude-status-<pane_id>.
set -g status-interval 1
set -g window-status-format         '#I:#W#F#(~/.config/tmux/claude-status.sh #{pane_id})'
set -g window-status-current-format '#I:#W#F#(~/.config/tmux/claude-status.sh #{pane_id})'
