set -g prefix C-Space
unbind C-b
unbind C-q

set -g mouse on
set -g history-limit 1000
set -g set-titles on
set -g set-titles-string '#S:#I:#W - #{pane_title}'

# Pane navigation (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (prefix + HJKL, repeatable)
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Split panes (keep current path)
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Seamless pane/split navigation with Neovim (smart-splits.nvim)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# OSC 52 (clipboard) を外側ターミナルへ流すための tmux 設定。
# - set-clipboard external: tmux 3.x で OSC 52 を外側に emit させる
# - allow-passthrough: 未対応 OSC を DCS でラップして通す経路 (例: nvim → IME 用 OSC 1337)
# - terminal-overrides Ms=...: tmux に OSC 52 のフォーマットを教える (xterm 系の場合)
# 旧来 mosh 用に持っていたカスタム MouseDragEnd1Pane バインドは
# Eternal Terminal (et) 移行で不要になったため撤去 (2026-04-30)。
set -g set-clipboard external
set -g allow-passthrough on
set -g terminal-overrides "xterm-256color:Ms=\\E]52;c;%p2%s\\E\\\\"

set -g status on
set -g status-position bottom
set -g status-style 'bg=default,fg=colour250'
set -g status-left-length 20
set -g status-left '#(if [ -f ~/.machine-name ]; then cat ~/.machine-name; else hostname -s; fi):: '
set -g status-right ''

# Per-window Claude Code agent status (running/waiting/idle)
# Hooks in ~/.claude/settings.json write state to /tmp/claude-status-<pane_id>.
# Icon is placed between the window name and the flag (*/-) so it reads as
# "this window's Claude" rather than floating free.
set -g status-interval 1
set -g window-status-format         '#I:#W#(~/.config/tmux/claude-status.sh #{pane_id})#F'
set -g window-status-current-format '#I:#W#(~/.config/tmux/claude-status.sh #{pane_id})#F'
set -g window-status-separator ' | '
